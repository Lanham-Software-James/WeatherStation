name: Testing

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  native-tests:
    name: native-tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run native tests
        run: pio test -e native
