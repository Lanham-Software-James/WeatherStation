[env:esp32dev]
platform = platformio/espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_unflags =
    -std=gnu++11

build_flags =
    -std=gnu++17

lib_deps =
    adafruit/Adafruit BMP280 Library
    sensirion/Sensirion I2C SHT4x
;    knolleary/PubSubClient

[env:native]
platform = native
test_framework = doctest
test_build_src = yes
build_flags =
    -std=gnu++20
    -I include
build_src_filter =
    +<*>
    -<main.cpp>
    -<sensors/SHT41Sensor.cpp>
    -<sensors/BMP280Sensor.cpp>
    -<sensors/SensorFactory.cpp>
    -<controller/WeatherStationController.cpp>
