[env:esp32dev]
platform = platformio/espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs

build_unflags =
    -std=gnu++11

build_flags =
    -std=gnu++17

lib_deps =
    adafruit/Adafruit BMP280 Library
    sensirion/Sensirion I2C SHT4x
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0

build_src_filter =
    +<*>
    -<filesystem/NativeFileAdapter.cpp>

[env:native]
platform = native
test_framework = doctest
test_build_src = yes
build_flags =
    -std=gnu++20
    -I include
build_src_filter =
    +<*>
    -<main.cpp>
    -<sensors/adapters/SHT41Sensor.cpp>
    -<sensors/adapters/BMP280Sensor.cpp>
    -<publisher/adapters/PubSubClientAdapter.cpp>
    -<logging/adapters/SerialLogger.cpp>
    -<time/adapters/ArduinoClock.cpp>
    -<filesystem/LittleFSAdapter.cpp>

lib_deps =
    bblanchon/ArduinoJson @ ^7.0
